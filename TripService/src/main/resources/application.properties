server.port=8082
spring.application.name=trip-service

# Database
spring.datasource.url=jdbc:postgresql://localhost:5434/trailsync_trip
spring.datasource.username=trail
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# JWT (same secret as auth-service)
jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIHN1bW1pdEJhc2UgYXBwbGljYXRpb24=

# Trail Service URL (inter-service HTTP call)
trail.service.url=http://localhost:8081