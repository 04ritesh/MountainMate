services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: trailsync_auth
      POSTGRES_USER: trail
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      -  "6380:6379"

  trail-postgres:
    image: postgres:16
    container_name: trailsync-trail-postgres
    environment:
      POSTGRES_DB: trailsync_trail
      POSTGRES_USER: trail
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: trailsync-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: trailsync-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  minio:
    image: minio/minio:latest
    container_name: trailsync-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  trip-postgres:
    image: postgres:16
    container_name: trailsync-trip-postgres
    environment:
      POSTGRES_DB: trailsync_trip
      POSTGRES_USER: trail
      POSTGRES_PASSWORD: secret
    ports:
      - "5434:5432"
volumes:
  postgres_data:
  minio_data:
  trip_postgres_data: